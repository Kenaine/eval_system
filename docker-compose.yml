version: '3.8'

services:
  postgres-db:
    image: postgres:latest
    container_name: postgres-db
    environment:
      POSTGRES_USER: ${DB_USER:-test_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-testing}
      POSTGRES_DB: ${DB_NAME:-test_db}
    ports:
      - "3000:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - thesis-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-test_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend-api
    environment:
      DATABASE_URL: postgresql://${DB_USER:-test_user}:${DB_PASSWORD:-testing}@postgres-db:5432/${DB_NAME:-test_db}
    ports:
      - "8000:8000"
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - thesis-network
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3001:3000"
    depends_on:
      - backend-api
    networks:
      - thesis-network
    environment:
      REACT_APP_API_URL: http://backend-api:8000

volumes:
  postgres_data:

networks:
  thesis-network:
    driver: bridge